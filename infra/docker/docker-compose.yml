  #   restart: unless-stopped

  # # ── 5. MINIO INIT (DEPRECATED - migrated to AWS S3) ─────────
  # minio-init:
  #   image: minio/mc:latest
  #   depends_on:
  #     minio:
  #       condition: service_healthy
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vex}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  #   entrypoint: >
  #     /bin/sh -c "
  #     until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD 2>/dev/null; do
  #       echo 'MinIO bekleniyor...'; sleep 3;
  #     done;
  #     # Public buckets
  #     mc mb --ignore-existing local/chrry-chat-files;
