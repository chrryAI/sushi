  # ── 6. MALWARE SCANNER (ClamAV) ───────────────────────────────
  malware-scanner:
    build:
      context: ../malwareScanner
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3006
      - CLAMD_SOCKET=/var/run/clamav/clamd.ctl
    volumes:
      - clamav-db:/var/lib/clamav
      - clamav-log:/var/log/clamav
      - clamav-run:/var/run/clamav
    networks:
      - vex-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3006"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  # ── 7. DB INIT (migration, bir kez çalışır) ──────────────────
  db-init:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: vex-api:latest
    working_dir: /app
    command: >
      sh -c "cd /app/packages/machine && pnpm migrate"
    environment:
      DB_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DB_PROD_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      NODE_ENV: production
      DISABLE_DB_SSL: "true"
      SEED_MODE: ${SEED_MODE:-e2e}
    networks:
      - vex-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

  # ── 8. API ───────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: vex-api:latest
    ports:
      - "3005:3002" # chrry.dev → Traefik/Dokploy proxy
      - "3007:3002" # ws.chrry.dev WebSocket
    env_file:
      - .env
    environment:
      # Database
      DB_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DB_PROD_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DISABLE_DB_SSL: "true"
      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # AWS S3 Configuration
      S3_INTERNAL_ENDPOINT: "https://s3.eu-central-1.amazonaws.com"
      S3_ENDPOINT: "https://s3.eu-central-1.amazonaws.com"
      S3_PUBLIC_URL: "https://chrry-chat-files-prod-eu.s3.eu-central-1.amazonaws.com"
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: "chrry-chat-files-prod-eu"
      S3_BUCKET_NAME_APPS: "chrry-app-profiles-prod-eu"
      S3_BUCKET_NAME_PRIVATE: "chrry-private-prod-eu"
      S3_REGION: "eu-central-1"
      # FalkorDB
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      ENABLE_GRAPH_RAG: "true"
      # App
      NODE_ENV: production
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
      FRONTEND_URL: "https://chrry.ai"
      CHRRY_URL: "https://chrry.ai"
      API_URL: "https://chrry.dev/api"
      # OAuth
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID}
      GOOGLE_WEB_CLIENT_SECRET: ${GOOGLE_WEB_CLIENT_SECRET}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID}
      # AI APIs
      CHATGPT_API_KEY: ${CHATGPT_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # Services
      ZEPTOMAIL_API_KEY: ${ZEPTOMAIL_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      # NATS JetStream
      NATS_URL: "nats://nats:4222"
      # Malware Scanner (internal Docker network)
      MALWARE_SCANNER_URL: http://malware-scanner:3006
      MALWARE_SCANNER_API_KEY: ${MALWARE_SCANNER_API_KEY}
      # FLASH_INTERNAL_URL: "http://chrry:5173"
      # INTERNAL_API_URL: "http://api:3002/api"
    networks:
      - vex-net
      - dokploy-network
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── 9. CHRRY (Frontend SSR) ───────────────────────────────────
  chrry:
    build:
      context: ../..
      dockerfile: apps/chrry/Dockerfile
    image: vex-chrry:latest
    ports:
      - "3008:5173" # chrry.ai → Traefik/Dokploy proxy
    environment:
      NODE_ENV: production
      PORT: "5173"
      HOST: "0.0.0.0"
      API_URL: "https://chrry.dev/api"
      API_INTERNAL_URL: "http://api:3002/api"
    networks:
      - vex-net
      - dokploy-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── 10. N8N (Workflow Automation) ─────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.104.0
    container_name: vex3-stack-n8n-1
    ports:
      - "5678:5678"
    environment:
      # Host & URL - Subpath configuration
      N8N_HOST: ${N8N_HOST:-chrry.ai}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      WEBHOOK_URL: https://${N8N_HOST:-chrry.ai}/n8n/
      # Security
      N8N_SECURE_COOKIE: false
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY gerekli}
      # Basic Auth
      N8N_BASIC_AUTH_ACTIVE: true
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD gerekli}
      # Database (Postgres)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-vex}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # Timezone
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Istanbul}
      NODE_ENV: production
      # Telemetry
      N8N_DIAGNOSTICS_ENABLED: false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - vex-net
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/n8n/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    labels:
      # Dokploy/Traefik routing - subpath
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST:-chrry.ai}`) && PathPrefix(`/n8n`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certResolver=letsencrypt"
      - "traefik.http.middlewares.n8n-stripprefix.stripprefix.prefixes=/n8n"
      - "traefik.http.middlewares.n8n-headers.headers.customRequestHeaders.X-Forwarded-Prefix=/n8n"
      - "traefik.http.routers.n8n.middlewares=n8n-stripprefix,n8n-headers"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  falkordb_data:
  clamav-db:
  clamav-log:
  clamav-run:
  n8n_data:
  nats_data:
  # MinIO volume (DEPRECATED - migrated to AWS S3)
  # vex3-peach-minio-data:
  #   external: true

networks:
  vex-net:
    driver: bridge
  dokploy-network:
    external: true
