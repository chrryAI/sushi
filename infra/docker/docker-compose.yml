name: vex3-stack

# ─────────────────────────────────────────────────────────────
# Dokploy → Stack olarak ekle, Environment tab'ına şunları gir:
#
# POSTGRES_PASSWORD=<your-password>
# REDIS_PASSWORD=<your-password>
# MALWARE_SCANNER_API_KEY=<random-key>
# S3_ACCESS_KEY_ID=<your-key>
# S3_SECRET_ACCESS_KEY=<your-secret>
# API_IMAGE=<registry>:<commit-sha>
# FLASH_IMAGE=<registry>:<commit-sha>
# SEED_MODE=prod
# ─────────────────────────────────────────────────────────────

services:
  # ── 1. POSTGRES ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli}
      POSTGRES_DB: ${POSTGRES_DB:-vex}
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=4GB
      -c work_mem=64MB
      -c maintenance_work_mem=1GB
      -c effective_cache_size=12GB
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - vex-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vex}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── 2. REDIS ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    volumes:
      - redis_data:/data
    networks:
      - vex-net
    restart: unless-stopped

  # ── 3. FALKORDB ──────────────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    volumes:
      - falkordb_data:/data
    networks:
      - vex-net
    restart: unless-stopped

  # ── 3.5 NATS ─────────────────────────────────────────────────
  nats:
    image: nats:latest
    command: "-js"
    volumes:
      - nats_data:/data/jetstream
    networks:
      - vex-net
    restart: unless-stopped

