# ═══════════════════════════════════════════════════════════════
# 🍣 SUSHI - MACHINE (Dokploy Deployment)
# ═══════════════════════════════════════════════════════════════
# App Name: machine
# Server: watermelon
# Services:
#   🖥️ machine   = Main App (Dokploy'da bu isimle görünür)
#   📊 machine-dashboard = Vite React Web Dashboard (machine içinde)
#   🧇 waffles   = E2E Test DB (machine için)
#   🍒 cherry    = Redis (Port/Cache)
#   🍑 peach     = MinIO S3 Storage
#   🔷 vex       = FalkorDB Knowledge Graph
#   🦛 hippo     = PostgreSQL Main DB
# ═══════════════════════════════════════════════════════════════

version: "3.8"

name: machine

services:
  # ─────────────────────────────────────────────
  # 🦛 HIPPO - PostgreSQL 16 + pgvector (Main DB)
  # ─────────────────────────────────────────────
  hippo:
    image: pgvector/pgvector:pg18
    container_name: watermelon-hippo
    hostname: hippo
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vex_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-vex}
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c idle_in_transaction_session_timeout=30000
    volumes:
      - hippo_data:/var/lib/postgresql/data
      - ../../scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    networks:
      - watermelon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vex}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # 🧇 WAFFLES - PostgreSQL 16 (E2E Test DB)
  # ─────────────────────────────────────────────
  waffles:
    image: pgvector/pgvector:pg18
    container_name: watermelon-waffles
    hostname: waffles
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli}
      POSTGRES_DB: waffles
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
    volumes:
      - waffles_data:/var/lib/postgresql/data
    networks:
      - watermelon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # 🍒 CHERRY - Redis 7.2 (Port/Cache)
  # ─────────────────────────────────────────────
  cherry:
    image: redis:7.2-alpine
    container_name: watermelon-cherry
    hostname: cherry
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-cherry_redis_local}"
    volumes:
      - cherry_data:/data
    networks:
      - watermelon-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cherry_redis_local}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # 🍑 PEACH - MinIO S3 Storage
  # API: :9000  Console: :9001
  # ─────────────────────────────────────────────
  peach:
    image: minio/minio:latest
    container_name: watermelon-peach
    hostname: peach
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sushi}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-peach_minio_local}
    command: server /data --console-address ":9001"
    volumes:
      - peach_data:/data
    networks:
      - watermelon-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 20s
      retries: 5

  # ─────────────────────────────────────────────
  # 🍑 PEACH INIT - Bucket Setup
  # ─────────────────────────────────────────────
  peach-init:
    image: minio:latest
    container_name: watermelon-peach-init
    depends_on:
      peach:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://peach-e2e:9000 ${MINIO_ROOT_USER:-sushi} ${MINIO_ROOT_PASSWORD:-peach_minio_local};
      mc mb --ignore-existing local/chrry-chat-files;
      mc mb --ignore-existing local/chrry-app-profiles;
      mc mb --ignore-existing local/chrry-dev;
      mc anonymous set download local/chrry-chat-files;
      mc anonymous set download local/chrry-app-profiles;
      mc anonymous set download local/chrry-dev;
      echo '✅ Peach (MinIO) buckets ready';
      exit 0;
      "
    networks:
      - watermelon-net

  # ─────────────────────────────────────────────
  # 🔷 VEX - FalkorDB Knowledge Graph
  # ─────────────────────────────────────────────
  vex:
    image: falkordb/falkordb:latest
    container_name: watermelon-vex
    hostname: vex
    restart: unless-stopped
    volumes:
      - vex_data:/data
    networks:
      - watermelon-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # 🚀 NATS - Message Queue + JetStream
  # ─────────────────────────────────────────────
  nats:
    image: nats:latest
    container_name: watermelon-nats
    hostname: nats
    restart: unless-stopped
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data/jetstream
    networks:
      - watermelon-net

  # ─────────────────────────────────────────────
  # 📧 MAILHOG - Local SMTP
  # ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: watermelon-mailhog
    hostname: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - watermelon-net

  # ─────────────────────────────────────────────
  # ₿ BTCPAY - Bitcoin Payment Server (Swarm only)
  # Console: :14142
  # ─────────────────────────────────────────────
  btcpay-db:
    image: postgres:16-alpine
    container_name: watermelon-btcpay-db
    hostname: btcpay-db
    profiles: ["swarm"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: btcpay
      POSTGRES_PASSWORD: ${BTCPAY_DB_PASSWORD:-btcpay_local}
      POSTGRES_DB: btcpaydb
    volumes:
      - btcpay_db_data:/var/lib/postgresql/data
    networks:
      - watermelon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btcpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  btcpay:
    image: btcpayserver/btcpayserver:latest
    container_name: watermelon-btcpay
    hostname: btcpay
    profiles: ["swarm"]
    restart: unless-stopped
    depends_on:
      btcpay-db:
        condition: service_healthy
    environment:
      BTCPAY_POSTGRES: "User ID=btcpay;Password=${BTCPAY_DB_PASSWORD:-btcpay_local};Host=btcpay-db;Port=5432;Database=btcpaydb"
      BTCPAY_NETWORK: mainnet
      BTCPAY_BIND: "0.0.0.0:14142"
      BTCPAY_ROOTPATH: /
      BTCPAY_UPDATEURL: ""
      BTCPAY_DEBUGLOG: btcpay.log
    ports:
      - "14142:14142"
    volumes:
      - btcpay_data:/datadir
    networks:
      - watermelon-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14142/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  hippo_data:
    driver: local
  waffles_data:
    driver: local
  cherry_data:
    driver: local
  peach_data:
    driver: local
  vex_data:
    driver: local
  btcpay_data:
    driver: local
  btcpay_db_data:
    driver: local
  nats_data:
    driver: local

networks:
  watermelon-net:
    driver: bridge
    name: watermelon-net
