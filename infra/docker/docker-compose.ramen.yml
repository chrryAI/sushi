services:
  ramen:
    image: mattermost/mattermost-team-edition:9.11
    container_name: ramen-mattermost
    restart: unless-stopped
    ports:
      - 8066:8065
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli}@ramen-postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://ramen.chrry.ai
      MM_SERVICESETTINGS_LISTENADDRESS: :8065
      MM_SERVICESETTINGS_ENABLELOCALMODE: "true"
      # .env dosyasından okunan veya varsayılan olarak true olan değerler
      MM_TEAMSETTINGS_ENABLEUSERCREATION: ${MM_TEAMSETTINGS_ENABLEUSERCREATION:-true}
      MM_TEAMSETTINGS_ENABLEOPENSERVER: ${MM_TEAMSETTINGS_ENABLEOPENSERVER:-true}
      MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL: ${MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL:-true}
      MM_EMAILSETTINGS_SEND_EMAIL_NOTIFICATIONS: ${MM_EMAILSETTINGS_SEND_EMAIL_NOTIFICATIONS:-true}
      MM_SERVICESETTINGS_ENABLECUSTOMCSS: ${MM_SERVICESETTINGS_ENABLECUSTOMCSS:-true}
      MM_SERVICESETTINGS_CUSTOMCSS: ${MM_SERVICESETTINGS_CUSTOMCSS:-[class*="FreeEdition"],[class*="Unsupported"]{display:none!important;}}
    volumes:
      - ramen_data:/mattermost/data
      - ramen_logs:/mattermost/logs
      - ramen_config:/mattermost/config
      - ramen_plugins:/mattermost/plugins
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ramen
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8065/api/v4/system/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    container_name: ramen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli}
      POSTGRES_DB: mattermost
    volumes:
      - ramen_postgres:/var/lib/postgresql/data
    networks:
      - ramen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ramen_data:
  ramen_logs:
  ramen_config:
  ramen_plugins:
  ramen_postgres:

networks:
  ramen:
    driver: bridge