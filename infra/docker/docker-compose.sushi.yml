name: vex3-stack

# ─────────────────────────────────────────────────────────────
# Dokploy → Stack olarak ekle, Environment tab'ına şunları gir:
#
# POSTGRES_PASSWORD=<your-password>
# REDIS_PASSWORD=<your-password>
# MINIO_ROOT_PASSWORD=<your-password>
# S3_ACCESS_KEY_ID=<your-key>
# S3_SECRET_ACCESS_KEY=<your-secret>
# API_IMAGE=<registry>:<commit-sha>
# FLASH_IMAGE=<registry>:<commit-sha>
# SEED_MODE=prod
# ─────────────────────────────────────────────────────────────

services:
  # ── 1. POSTGRES ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli}
      POSTGRES_DB: ${POSTGRES_DB:-vex}
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=4GB
      -c work_mem=64MB
      -c maintenance_work_mem=1GB
      -c effective_cache_size=12GB
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - vex-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vex}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── 2. REDIS ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    volumes:
      - redis_data:/data
    networks:
      - vex-net
    restart: unless-stopped

  # ── 3. FALKORDB ──────────────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    volumes:
      - falkordb_data:/data
    networks:
      - vex-net
    restart: unless-stopped

  # ── 4. MINIO (15GB vex3-peach-minio-data korunuyor) ──────────
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD gerekli}
    command: server /data --console-address ":9001"
    volumes:
      - vex3-peach-minio-data:/data
    networks:
      - vex-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 20s
      retries: 5
    restart: unless-stopped

  # ── 5. MINIO INIT (bucket oluştur, bir kez çalışır) ──────────
  minio-init:
    image: minio:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD 2>/dev/null; do
        echo 'MinIO bekleniyor...'; sleep 3;
      done;
      mc mb --ignore-existing local/chrry-chat-files;
      mc mb --ignore-existing local/chrry-app-profiles;
      mc mb --ignore-existing local/chrry-installs;
      mc anonymous set download local/chrry-chat-files;
      mc anonymous set download local/chrry-app-profiles;
      echo 'MinIO buckets hazir';
      "
    networks:
      - vex-net
    restart: "no"

  # ── 6. DB INIT (migration, bir kez çalışır) ──────────────────
  db-init:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: vex-api:latest
    working_dir: /app
    command: >
      sh -c "cd /app/packages/machine && pnpm migrate"
    environment:
      DB_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DB_PROD_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      NODE_ENV: production
      DISABLE_DB_SSL: "true"
      SEED_MODE: ${SEED_MODE:-e2e}
    networks:
      - vex-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

  # ── 7. API ───────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: vex-api:latest
    ports:
      - "3005:3002" # chrry.dev → Traefik/Dokploy proxy
      - "3007:3002" # ws.chrry.dev WebSocket
    env_file:
      - .env
    environment:
      # Database
      DB_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DB_PROD_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-vex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vex}"
      DISABLE_DB_SSL: "true"
      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # MinIO / S3
      S3_INTERNAL_ENDPOINT: "http://minio:9000"
      S3_ENDPOINT: "https://minio.chrry.dev"
      S3_PUBLIC_URL: "https://minio.chrry.dev"
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: "chrry-chat-files"
      S3_BUCKET_NAME_APPS: "chrry-app-profiles"
      S3_BUCKET_NAME_INSTALLS: "chrry-installs"
      # FalkorDB
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      ENABLE_GRAPH_RAG: "true"
      # App
      NODE_ENV: production
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
      FRONTEND_URL: "https://chrry.ai"
      CHRRY_URL: "https://chrry.ai"
      API_URL: "https://chrry.dev/api"
      # OAuth
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID}
      GOOGLE_WEB_CLIENT_SECRET: ${GOOGLE_WEB_CLIENT_SECRET}
      GOOGLE_IOS_CLIENT_ID: ${GOOGLE_IOS_CLIENT_ID}
      # AI APIs
      CHATGPT_API_KEY: ${CHATGPT_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # Services
      ZEPTOMAIL_API_KEY: ${ZEPTOMAIL_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      # FLASH_INTERNAL_URL: "http://chrry:5173"
      # INTERNAL_API_URL: "http://api:3002/api"
    networks:
      - vex-net
      - dokploy-network
    depends_on:
      db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── 8. FLASH (Frontend SSR) ───────────────────────────────────
  chrry:
    build:
      context: ../..
      dockerfile: apps/chrry/Dockerfile
    image: vex-chrry:latest
    ports:
      - "3008:5173" # chrry.ai → Traefik/Dokploy proxy
    environment:
      NODE_ENV: production
      PORT: "5173"
      HOST: "0.0.0.0"
      # API_URL: "http://api:3002/api"
      # INTERNAL_API_URL: "http://api:3002/api"
    networks:
      - vex-net
      - dokploy-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  falkordb_data:
  # Mevcut 15.6GB MinIO verisi korunuyor
  vex3-peach-minio-data:
    external: true

networks:
  vex-net:
    driver: bridge
  dokploy-network:
    external: true
