# =============================================================================
# Self-Hosted Hyperparameter Tuning - Vertex AI Alternative
# 128GB VPS için Optuna + n8n + Parallel Workers
# Agent Memory & Performance Optimization
# =============================================================================
# 
# Kullanım:
#   docker compose -f docker-compose.optuna.yml up -d
#
# Dashboard'lar:
#   - Optuna Dashboard: http://localhost:8080
#   - n8n: http://localhost:5678
#
# Trial Worker Scale:
#   docker compose -f docker-compose.optuna.yml up -d --scale trial-worker=8
#
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL - Optuna storage + trial history + n8n
  # ===========================================================================
  optuna-storage:
    image: postgres:16-alpine
    container_name: optuna-db
    environment:
      POSTGRES_DB: optuna
      POSTGRES_USER: optuna
      POSTGRES_PASSWORD: ${OPTUNA_DB_PASS:-optuna_pass_123}
    volumes:
      - optuna_data:/var/lib/postgresql/data
      - ./scripts/init-optuna-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - optuna-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optuna"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # Optuna Dashboard - Real-time trial monitoring
  # ===========================================================================
  optuna-dashboard:
    image: ghcr.io/optuna/optuna-dashboard:latest
    container_name: optuna-dashboard
    ports:
      - "8080:8080"
    environment:
      OPTUNA_STORAGE: postgresql://optuna:${OPTUNA_DB_PASS:-optuna_pass_123}@optuna-storage:5432/optuna
    networks:
      - optuna-net
    depends_on:
      optuna-storage:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # n8n - Workflow orchestration for agent experiments
  # ===========================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASS:-n8n_pass_123}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: optuna-storage
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: optuna
      DB_POSTGRESDB_PASSWORD: ${OPTUNA_DB_PASS:-optuna_pass_123}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-n8n-encryption-key-change-me}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/backup/workflows
    networks:
      - optuna-net
      - vex-net
    depends_on:
      optuna-storage:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # Trial Worker - Python worker for parallel hyperparameter trials
  # Agent memory optimization experiments
  # ===========================================================================
  trial-worker:
    build:
      context: ./workers/trial-worker
      dockerfile: Dockerfile
    container_name: optuna-worker-${WORKER_ID:-1}
    environment:
      OPTUNA_STORAGE: postgresql://optuna:${OPTUNA_DB_PASS:-optuna_pass_123}@optuna-storage:5432/optuna
      DB_URL: ${DB_URL:-postgresql://optuna:${OPTUNA_DB_PASS:-optuna_pass_123}@optuna-storage:5432/optuna}
      API_URL: ${API_URL:-http://host.docker.internal:3002}
      TRIAL_USER_ID: ${TRIAL_USER_ID:-}
      STUDY_NAME: ${STUDY_NAME:-agent-memory-optimizer}
      WORKER_ID: ${WORKER_ID:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks:
      - optuna-net
      - vex-net
    depends_on:
      optuna-storage:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  # ===========================================================================
  # Redis - Distributed caching + n8n queue
  # ===========================================================================
  optuna-redis:
    image: redis:7.2-alpine
    container_name: optuna-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - optuna_redis_data:/data
    networks:
      - optuna-net
    restart: unless-stopped

  # ===========================================================================
  # MLflow - Experiment tracking (optional but recommended)
  # ===========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    container_name: optuna-mlflow
    ports:
      - "5001:5000"
    environment:
      MLFLOW_TRACKING_URI: postgresql://optuna:${OPTUNA_DB_PASS:-optuna_pass_123}@optuna-storage:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - optuna-net
    depends_on:
      optuna-storage:
        condition: service_healthy
    restart: unless-stopped

volumes:
  optuna_data:
  n8n_data:
  optuna_redis_data:
  mlflow_data:

networks:
  optuna-net:
    driver: bridge
  vex-net:
    external: true
    name: vex_default
