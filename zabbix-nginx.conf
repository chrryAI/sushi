server {
    listen 80;
    server_name zabbix.chrry.ai;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name zabbix.chrry.ai;
    
    # SSL sertifikalarin (Certbot veya kendin imzalamis olabilir)
    ssl_certificate /etc/letsencrypt/live/zabbix.chrry.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zabbix.chrry.ai/privkey.pem;
    
    location / {
        proxy_pass http://127.0.0.1:5080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Zabbix icin zaman asimi ayarlari
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
