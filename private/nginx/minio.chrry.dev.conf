server {
    listen 80;
    listen [::]:80;
    server_name minio.chrry.dev;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minio.chrry.dev;

    # SSL certificates (LetsEncrypt)
    ssl_certificate /etc/letsencrypt/live/minio.chrry.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio.chrry.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    # === CRITICAL: Increase body size limit for MinIO S3 uploads ===
    # Default nginx value is 1m; images after Sharp processing (2-5MB+) exceed this.
    client_max_body_size 100M;

    # Proxy to MinIO (Docker internal port or bare metal port)
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / streaming support for MinIO console
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
