server {
    listen 443 ssl;
    server_name ramen.chrry.ai;

    ssl_certificate /etc/letsencrypt/live/chrry.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chrry.ai/privkey.pem;
    include /etc/nginx/ssl_params.conf;

    location / {
        proxy_pass http://localhost:8066;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support for Mattermost
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

server {
    listen 80;
    server_name ramen.chrry.ai;
    return 301 https://$host$request_uri;
}
